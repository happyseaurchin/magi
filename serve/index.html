<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Chat</title><style>body{font-family:sans-serif;max-width:600px;margin:50px auto}#input{width:100%;padding:10px;font-size:16px}#send{padding:10px 20px;margin-top:10px}#response{margin-top:20px;padding:10px;border:1px solid #ccc;min-height:40px;background:#f9f9f9}</style></head><body><h1>Chat</h1><input type="text" id="input" placeholder="Say something..."><button id="send">Send</button><div id="response">Waiting for response...</div><script>document.getElementById('send').onclick=async()=>{const text=document.getElementById('input').value;if(!text)return;await fetch('/input',{method:'POST',body:text});document.getElementById('input').value=''};setInterval(async()=>{const r=await fetch('/state');const j=await r.json();if(j['7'])document.getElementById('response').textContent=j['7']},2000);</script></body></html>
